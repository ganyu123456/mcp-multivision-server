version: "3.8"

services:
  mcp-multivision-server:
    image: ${MCP_IMAGE:-harbor.zkjgy.online/library/mcp-multivision-server:latest}
    container_name: mcp-multivision-server
    restart: unless-stopped

    ports:
      - "${MCP_PORT:-8093}:8093"

    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-sse}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8093
      - MCP_VISION_PROVIDER=${MCP_VISION_PROVIDER:-openai}
      - MCP_VISION_BASE_URL=${MCP_VISION_BASE_URL:-}
      - MCP_VISION_API_KEY=${MCP_VISION_API_KEY:-}
      - MCP_VISION_MODEL=${MCP_VISION_MODEL:-}
      - MCP_VISION_MAX_TOKENS=${MCP_VISION_MAX_TOKENS:-1024}
      - MCP_VISION_TEMPERATURE=${MCP_VISION_TEMPERATURE:-0.2}
      - MCP_VISION_TIMEOUT=${MCP_VISION_TIMEOUT:-60}
      - MCP_VISION_MAX_RETRIES=${MCP_VISION_MAX_RETRIES:-3}
      - MCP_VISION_MAX_FRAMES=${MCP_VISION_MAX_FRAMES:-8}
      - MCP_VISION_MAX_IMAGE_SIZE=${MCP_VISION_MAX_IMAGE_SIZE:-20971520}
      - MCP_VISION_ALLOWED_IMAGE_FORMATS=${MCP_VISION_ALLOWED_IMAGE_FORMATS:-jpeg,png,webp,gif,bmp,tiff}
      - MCP_VISION_CACHE_ENABLED=${MCP_VISION_CACHE_ENABLED:-false}
      - MCP_VISION_CACHE_DIR=${MCP_VISION_CACHE_DIR:-/tmp/mcp-vision-cache}
      - MCP_VISION_WORK_DIR=${MCP_VISION_WORK_DIR:-/tmp/mcp-vision}
      - MCP_FFMPEG_BIN=/usr/local/bin/ffmpeg
      - MCP_FFPROBE_BIN=/usr/local/bin/ffprobe

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/sse')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    labels:
      - "mcp.server.name=mcp-multivision-server"
      - "mcp.server.version=${MCP_VERSION:-latest}"
      - "mcp.server.description=Image and video analysis server for LLM agents"
